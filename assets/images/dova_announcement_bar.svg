<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 44" width="1200" height="44">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="40%" stop-color="#0F2A4A"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="44" fill="url(#barGrad)"/>
  <!-- Left accent line -->
  <rect width="3" height="44" fill="#1A7FE8"/>
  <!-- Right accent line -->
  <rect x="1197" width="3" height="44" fill="#1A7FE8"/>
  <!-- Blue bottom border -->
  <rect y="42" width="1200" height="2" fill="#1A7FE8" opacity="0.6"/>

  <!-- Key icon circle -->
  <circle cx="78" cy="22" r="14" fill="#1A7FE8"/>
  <!-- Key shape inside circle -->
  <circle cx="78" cy="17" r="5" fill="none" stroke="white" stroke-width="2"/>
  <line x1="78" y1="22" x2="78" y2="31" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="27" x2="82" y2="27" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="30" x2="81" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- D.O.V.A. text -->
  <text x="102" y="27" font-family="Georgia, serif" font-weight="700" font-size="15" fill="white" letter-spacing="2">D.O.V.A.</text>

  <!-- Separator dot -->
  <circle cx="182" cy="22" r="2.5" fill="#1A7FE8"/>

  <!-- PATENT PENDING label -->
  <rect x="194" y="12" width="136" height="20" rx="10" fill="#1A7FE8"/>
  <text x="262" y="26" font-family="Arial, sans-serif" font-weight="700" font-size="10.5" fill="white" text-anchor="middle" letter-spacing="1.5">PATENT PENDING</text>

  <!-- Center tagline -->
  <text x="600" y="27" font-family="Arial, sans-serif" font-size="12" fill="#C8DDEF" text-anchor="middle" letter-spacing="0.5">Smarter, Safer Vehicle Access — Digital Orchestration of Vehicle Authorization</text>

  <!-- Right side: getdova.com -->
  <text x="1060" y="20" font-family="Arial, sans-serif" font-size="10" fill="#7AAED6" text-anchor="middle" letter-spacing="0.5">getdova.com</text>
  <text x="1060" y="33" font-family="Arial, sans-serif" font-weight="700" font-size="10" fill="#2E9BFF" text-anchor="middle" letter-spacing="0.5">matthew@dovausa.com</text>
</svg>